global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'tiranafly-backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'tiranafly-worker'
    static_configs:
      - targets: ['worker:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
