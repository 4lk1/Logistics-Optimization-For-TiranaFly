version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: tiranafly
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tiranafly_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d tiranafly"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - tiranafly_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/tiranafly
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8001
      SIMULATION_SERVICE_URL: http://simulation-service:8002
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tiranafly_network

  ai-service:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.ai
    networks:
      - tiranafly_network

  simulation-service:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.simulation
    networks:
      - tiranafly_network

  worker:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/tiranafly
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tiranafly_network

  frontend:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.frontend
    depends_on:
      - backend
    networks:
      - tiranafly_network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
    networks:
      - tiranafly_network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - tiranafly_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tiranafly_network

networks:
  tiranafly_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
