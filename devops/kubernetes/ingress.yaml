apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiranafly-ingress
  namespace: tiranafly
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
  - hosts:
    - app.tiranafly.com
    secretName: tiranafly-tls
  rules:
  - host: app.tiranafly.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
