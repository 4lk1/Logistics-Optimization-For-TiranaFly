name: Production Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest httpx
        
    - name: Run Tests
      run: pytest backend/tests ai/tests fleet/tests
      
  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, ai, simulation, worker, frontend]
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and Push ${{ matrix.service }}
      uses: docker/build-push-action@v4
      with:
        context: .
        file: devops/docker/Dockerfile.${{ matrix.service }}
        push: true
        tags: tiranafly/${{ matrix.service }}:latest,tiranafly/${{ matrix.service }}:${{ github.sha }}

  deploy-to-eks:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1
        
    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --name tiranafly-cluster
      
    - name: Deploy Manifests
      run: |
        kubectl apply -f devops/kubernetes/base.yaml
        kubectl apply -f devops/kubernetes/postgres.yaml
        kubectl apply -f devops/kubernetes/redis.yaml
        kubectl apply -f devops/kubernetes/backend.yaml
        kubectl apply -f devops/kubernetes/ai-service.yaml
        kubectl apply -f devops/kubernetes/simulation-service.yaml
        kubectl apply -f devops/kubernetes/worker.yaml
        kubectl apply -f devops/kubernetes/frontend.yaml
        kubectl apply -f devops/kubernetes/ingress.yaml
