version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiranafly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alphine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      POSTGRES_SERVER: db
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A backend.worker.app worker --loglevel=info
    environment:
      POSTGRES_SERVER: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
